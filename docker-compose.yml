services:
  messenger:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SCYLLA_HOSTS: scylladb
      SCYLLA_KEYSPACE: messenger
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://messenger:messenger@rabbitmq:5672/
    depends_on:
      - scylladb
      - redis
      - rabbitmq

  scylladb:
    image: scylladb/scylla:5.4
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --smp 1 --memory 512M --overprovisioned 1

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: messenger
      RABBITMQ_DEFAULT_PASS: messenger

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"

volumes:
  scylla_data:
  grafana_data:
